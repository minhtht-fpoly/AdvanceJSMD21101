<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý sản phẩm</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <!-- TIÊU ĐỀ -->
      <h2 class="text-center mb-4 text-primary">Quản lý sản phẩm</h2>

      <!-- ===== BỘ LỌC ===== -->
      <div class="card shadow mb-4">
        <div class="card-header bg-secondary text-white">Bộ lọc sản phẩm</div>

        <div class="card-body">
          <div class="row g-3">
            <!-- Tên -->
            <div class="col-md-4">
              <label class="form-label">Tìm theo tên</label>
              <input
                type="text"
                class="form-control"
                placeholder="Nhập tên sản phẩm..."
                id="nameFilter"
              />
            </div>

            <!-- Category -->
            <div class="col-md-4">
              <label class="form-label">Danh mục</label>
              <select class="form-select" id="categoryFilter">
                <option value="">-- Tất cả --</option>
                <option>Phụ kiện</option>
                <option>Điện thoại</option>
                <option>Laptop</option>
              </select>
            </div>

            <!-- Giá -->
            <div class="col-md-4">
              <label class="form-label">Khoảng giá</label>
              <div class="d-flex gap-2">
                <input
                  type="number"
                  class="form-control"
                  placeholder="Từ"
                  id="minPriceFilter"
                />
                <input
                  type="number"
                  class="form-control"
                  placeholder="Đến"
                  id="maxPriceFilter"
                />
              </div>
            </div>

            <!-- Button -->
            <div class="col-12 text-end">
              <button
                class="btn btn-primary me-2"
                id="filterButton"
                onclick="filterProduct()"
              >
                Lọc
              </button>
              <button class="btn btn-outline-secondary">Reset</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== BẢNG ===== -->
      <div class="card shadow mb-4">
        <div class="card-header bg-dark text-white">Danh sách sản phẩm</div>

        <div class="card-body">
          <table class="table table-bordered table-hover">
            <thead class="table-dark text-center">
              <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>Giá</th>
                <th>Danh mục</th>
                <th>Stock</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="target"></tbody>
          </table>
        </div>
      </div>

      <!-- ===== FORM ===== -->

      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          Sửa thông tin sản phẩm
        </div>

        <div class="card-body">
          <form id="editForm" onsubmit="editProduct(event)">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" class="form-control" id="suaTenSP" />
              </div>

              <div class="col-md-6">
                <label class="form-label">Giá sản phẩm</label>
                <input type="number" class="form-control" id="suaGiaSP" />
              </div>

              <div class="col-md-6">
                <label class="form-label">Danh mục</label>
                <select class="form-select" id="suaDanhMucSP">
                  <option>Phụ kiện</option>
                  <option>Điện thoại</option>
                  <option>Laptop</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Số lượng</label>
                <input type="number" class="form-control" id="suaSoLuongSP" />
              </div>

              <div class="col-12 text-end">
                <button class="btn btn-success px-4">Lưu</button>
              </div>
            </div>
          </form>
        </div>
      </div>
